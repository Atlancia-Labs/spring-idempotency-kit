<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Spring Idempotency Kit — Architecture</text>

  <!-- ===== CLIENT ===== -->
  <rect x="50" y="75" width="160" height="64" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="100" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">CLIENT</text>
  <text x="130" y="120" text-anchor="middle" font-size="13" fill="#0f172a" font-weight="700">HTTP Request</text>

  <!-- Arrow: Client → Controller -->
  <line x1="210" y1="107" x2="290" y2="107" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="98" text-anchor="middle" font-size="9" fill="#6366f1" font-weight="600">Idempotency-Key</text>

  <!-- ===== SPRING BOUNDARY ===== -->
  <rect x="280" y="60" width="580" height="540" rx="14" fill="none" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="570" y="82" text-anchor="middle" font-size="11" fill="#818cf8" font-weight="600" letter-spacing="1">SPRING BOOT APPLICATION</text>

  <!-- ===== CONTROLLER ===== -->
  <rect x="300" y="90" width="200" height="50" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="112" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="700">@Idempotent Method</text>
  <text x="400" y="128" text-anchor="middle" font-size="10" fill="#6366f1">Controller / Service</text>

  <!-- Arrow: Controller → Aspect -->
  <line x1="400" y1="140" x2="400" y2="175" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="435" y="162" font-size="9" fill="#6366f1" font-weight="600">AOP @Around</text>

  <!-- ===== ASPECT (main box) ===== -->
  <rect x="300" y="180" width="540" height="130" rx="12" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="202" text-anchor="middle" font-size="14" fill="#3730a3" font-weight="700">IdempotencyAspect</text>

  <!-- Sub-steps inside aspect -->
  <rect x="320" y="215" width="120" height="36" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="380" y="237" text-anchor="middle" font-size="11" fill="#92400e" font-weight="600">Resolve Key</text>

  <rect x="460" y="215" width="120" height="36" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="520" y="237" text-anchor="middle" font-size="11" fill="#166534" font-weight="600">Cache Lookup</text>

  <rect x="600" y="215" width="120" height="36" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="660" y="237" text-anchor="middle" font-size="11" fill="#991b1b" font-weight="600">Acquire Lock</text>

  <rect x="740" y="215" width="80" height="36" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="780" y="237" text-anchor="middle" font-size="11" fill="#3730a3" font-weight="600">Execute</text>

  <!-- Sub-arrows -->
  <line x1="440" y1="233" x2="458" y2="233" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="233" x2="598" y2="233" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="233" x2="738" y2="233" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Key resolution detail -->
  <text x="380" y="290" text-anchor="middle" font-size="9" fill="#92400e">SpEL | HTTP Header</text>

  <!-- ===== REDIS ===== -->
  <!-- Redis icon / box -->
  <rect x="480" y="370" width="180" height="80" rx="12" fill="#fef2f2" stroke="#f87171" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="400" text-anchor="middle" font-size="15" fill="#dc2626" font-weight="800">Redis</text>
  <text x="570" y="418" text-anchor="middle" font-size="10" fill="#991b1b">SET NX  ·  GET  ·  DEL</text>
  <text x="570" y="434" text-anchor="middle" font-size="9" fill="#b91c1c">with TTL</text>

  <!-- Arrow: Aspect → Redis (cache lookup / lock) -->
  <line x1="520" y1="310" x2="540" y2="368" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="505" y="340" font-size="9" fill="#22c55e" font-weight="600">get / lock / store</text>

  <!-- ===== STORAGE INTERFACE ===== -->
  <rect x="480" y="335" width="180" height="28" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="570" y="354" text-anchor="middle" font-size="10" fill="#166534" font-weight="600" font-style="italic">IdempotencyStorage</text>

  <!-- Arrow: interface → Redis -->
  <line x1="570" y1="363" x2="570" y2="368" stroke="#22c55e" stroke-width="1.5"/>

  <!-- ===== RESPONSE PATHS ===== -->
  <!-- Cache hit path -->
  <rect x="80" y="370" width="170" height="50" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="393" text-anchor="middle" font-size="12" fill="#166534" font-weight="700">Cache Hit</text>
  <text x="165" y="408" text-anchor="middle" font-size="10" fill="#15803d">Return cached result</text>

  <path d="M 480 400 Q 350 400 252 395" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Concurrent path -->
  <rect x="80" y="440" width="170" height="50" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="462" text-anchor="middle" font-size="12" fill="#92400e" font-weight="700">Concurrent Request</text>
  <text x="165" y="477" text-anchor="middle" font-size="10" fill="#a16207">REJECT (409) | WAIT</text>

  <path d="M 480 420 Q 350 440 252 462" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- Fail-open path -->
  <rect x="80" y="510" width="170" height="50" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="165" y="532" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="700">Redis Unavailable</text>
  <text x="165" y="547" text-anchor="middle" font-size="10" fill="#b91c1c">Fail open — execute normally</text>

  <path d="M 480 440 Q 350 500 252 530" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>

  <!-- ===== AUTO-CONFIGURATION ===== -->
  <rect x="600" y="500" width="240" height="80" rx="12" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="525" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="700">IdempotencyAutoConfiguration</text>
  <text x="720" y="543" text-anchor="middle" font-size="10" fill="#7c3aed">Wires Aspect + Storage + Properties</text>
  <text x="720" y="558" text-anchor="middle" font-size="10" fill="#7c3aed">@ConditionalOnMissingBean</text>
  <text x="720" y="573" text-anchor="middle" font-size="9" fill="#8b5cf6">Custom storage → auto-config backs off</text>

  <!-- Arrow: AutoConfig → Aspect -->
  <path d="M 720 500 L 720 310 L 642 310" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Arrow: AutoConfig → Storage -->
  <path d="M 660 500 L 660 363" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 3"/>

  <!-- ===== LEGEND ===== -->
  <rect x="310" y="480" width="140" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="380" y="498" text-anchor="middle" font-size="10" fill="#475569" font-weight="700">LEGEND</text>
  <line x1="325" y1="510" x2="350" y2="510" stroke="#22c55e" stroke-width="2"/>
  <text x="358" y="514" font-size="9" fill="#475569">Cache hit / success</text>
  <line x1="325" y1="528" x2="350" y2="528" stroke="#f59e0b" stroke-width="2"/>
  <text x="358" y="532" font-size="9" fill="#475569">Concurrent handling</text>
  <line x1="325" y1="546" x2="350" y2="546" stroke="#ef4444" stroke-width="2"/>
  <text x="358" y="550" font-size="9" fill="#475569">Fail-open path</text>
  <line x1="325" y1="564" x2="350" y2="564" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="358" y="568" font-size="9" fill="#475569">Auto-wiring</text>
</svg>
